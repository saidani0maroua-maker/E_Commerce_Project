 <!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" contet="width=device-width, initial-scale=1.0">
  <title>Cart</title>
  <link rel="stylesheet" href ="s.css">
  <!--to add the cart caracter-->
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"/>
</head>
<body>
  
<nav>
    <a href="s.html" class="logo">Store</a>
    <a href="cart.html" class="cart-icon">
      <!--link of shopping caracter-->
      <i class="ri-shopping-cart-line"></i>
      <span class="cart-item-count"></span>
    </a>
  </nav>
<div class="cart">
    <div class="cart-header">
        <span>Products</span>
        <span>Price</span>
        <span>Quantity</span>
        <span>Total</span>
        <span>Remove</span>
    </div>

<div class="cart-items">
    
</div>
<div class="cart-total">
    <h3>Cart Total</h3>
    <p>Subtotal <span class="subtotal">3500 DA</span></p>
    <p>Delivery For <span>Free</span></p>
    <p>Grand Total <span class="grand-total">3500 DA</span></p>
    <button class="btn">Proceed to Checkout</button>
</div>
</div>




<script src="product.js"></script>
<script src="web.js"></script>
</body>
</html>
